services:
  - type: web
    name: hrms-lite-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FRONTEND_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: hrms-lite-db
          property: connectionString

databases:
  - name: hrms-lite-db
    plan: free
    databaseName: hrms_lite
